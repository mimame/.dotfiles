# ---------------------------------------------------------------------------
# tmux.conf – restored from git history (Nov 2022), adapted for tmux 3.5+
#
# Changes from the original:
#   - XDG base directory paths (~/.config/tmux/ instead of ~/)
#   - Wayland clipboard (wl-clipboard) instead of X11 xsel
#   - terminal-features (modern) instead of terminal-overrides
#   - Ghostty & Kitty truecolor support
#   - remain-on-exit, synchronize-panes toggle
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# ESCAPE TIME
# ---------------------------------------------------------------------------
# Zero the escape key timeout. The default (500ms) causes a noticeable delay
# when pressing Alt+key combos in terminals that send ESC-prefixed sequences.
set -sg escape-time 0
# Enable the Kitty keyboard protocol so modified keys (Shift+Enter, Ctrl+I, etc.)
# are forwarded as distinct escape sequences instead of being collapsed into
# plain ASCII. Required for Shift+Enter → newline in opencode and similar tools.
set -s extended-keys on

# ---------------------------------------------------------------------------
# 24-BIT ("TRUE") COLOR
# ---------------------------------------------------------------------------
# Tell tmux and terminal emulators to use 24-bit colour (16.7M colours)
# instead of the 256-colour palette. Required for modern Dracula themes,
# syntax highlighting, and smooth gradients.
# - default-terminal: informs programs inside tmux that they can use 256+
#   colours. Some programs (e.g. helix, nvim) check $TERM to decide.
# - terminal-features: the modern equivalent of terminal-overrides (tmux 3.2+).
#   Enables the 'RGB' capability for all terminals and specifically for
#   ghostty and kitty, which both advertise truecolor via different entries.
set -g default-terminal "tmux-256color"        # Programs see $TERM=tmux-256color
set -ga terminal-features ',*:RGB'             # 24-bit truecolor for all terminals
set -ga terminal-features ',*:hyperlinks'      # OSC 8 clickable links (eza, file paths, URLs)
set -ga terminal-features ',*:clipboard'       # OSC 52 copy to system clipboard
set -ga terminal-features ',ghostty:extkeys'   # Kitty keyboard protocol (keys beyond 32)
set -ga terminal-features ',ghostty:sync'      # Synchronized updates (tear-free redraw)
set -ga terminal-features ',kitty:extkeys'     # Kitty keyboard protocol for kitty terminal
set -ga terminal-features ',kitty:sync'        # Synchronized updates for kitty terminal

# ---------------------------------------------------------------------------
# PREFIX KEY – C-Space
# ---------------------------------------------------------------------------
# Matches the tmux-mode key in Zellij (Ctrl+Space), so muscle memory carries
# across both multiplexers. The default C-b is far from home row.
unbind C-b
set -g prefix C-Space
# bind Space send-prefix       # overridden by copy-mode binding below

# ---------------------------------------------------------------------------
# WINDOW & PANE INDEXING
# ---------------------------------------------------------------------------
# Start numbering at 1 instead of 0. Humans don't think in zero-indexed
# window numbers ("go to window 1" not "go to window 0").
set -g base-index 1
setw -g pane-base-index 1
# Automatically renumber windows when one is closed (no gaps).
set-option -g renumber-windows on

# ---------------------------------------------------------------------------
# MOUSE, REMAIN-ON-EXIT, MODE KEYS, STATUS, RENAMING, FOCUS
# ---------------------------------------------------------------------------
set -g mouse on               # Click to focus/select panes, resize with drag
set -g allow-passthrough all  # Pass OSC 8 hyperlinks through (eza ls output, URLs)
# set -g remain-on-exit on  # disabled: leaves [dead] panes stuck
setw -g mode-keys vi          # Vi-style navigation in copy/search mode (h/j/k/l)
set -g status-position top    # Status bar on top (consistent with Zellij layout)
setw -g automatic-rename on   # Let tmux auto-rename windows based on the running program
setw -g allow-rename on       # Programs can rename their window via OSC escape sequences
set-option -g focus-events on # Forward focus events to vim/neovim for autoread

# ---------------------------------------------------------------------------
# SCROLL & SEARCH (like Zellij scroll/search mode)
# ---------------------------------------------------------------------------
# Enter copy mode (scroll/search):
#   C-Space Space — enter copy mode
#   PageUp — enter copy mode at current position and scroll up
# Inside copy mode:
#   j/k — line up/down     C-u/C-d — half page     C-b/C-f — full page
#   / — search forward      ? — search backward     n/N — next/prev match
#   v — start selection     y — yank and exit       q/Esc — exit
unbind PageUp
bind -n PageUp copy-mode -eu          # Scroll up with PageUp (like Zellij)
# Uses wl-clipboard (wl-copy / wl-paste) because this machine runs Wayland.
# X11 tools (xsel, xclip) do not work under Wayland without XWayland.
unbind [                      # Default C-b [ conflicts with our prefix
bind Space copy-mode          # C-Space Space enters copy mode
unbind p
bind p run-shell "tmux set-buffer \"$(wl-paste --primary)\"; tmux paste-buffer -p"
bind-key -T copy-mode-vi 'v' send -X begin-selection  # v starts selection (vim-like)
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy"  # y yanks to clipboard
bind-key -T copy-mode-vi 'V' send -X select-line      # V selects whole line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle  # r toggles block selection

# ---------------------------------------------------------------------------
# SMART PANE SWITCHING – helix / vim / fzf / yazi awareness
# ---------------------------------------------------------------------------
# When C-h/j/k/l is pressed, check if the foreground process is helix,
# neovim, fzf, or vifm. If so, forward the keystroke to that program instead
# of switching tmux panes. This lets you navigate vim splits and tmux panes
# seamlessly with the same keys.
is_editor="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(hx|helix|g?(view|n?vim?x?)(diff)?)$'"
is_fzf="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?fzf$'"
is_fm="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(ya|vifm)$'"
bind-key -n C-h if-shell  "$is_editor || $is_fm || $is_fzf" "send-keys C-h"  "select-pane -L"
bind-key -n C-j if-shell  "$is_editor || $is_fm || $is_fzf" "send-keys C-j"  "select-pane -D"
bind-key -n C-k if-shell  "$is_editor || $is_fm || $is_fzf" "send-keys C-k"  "select-pane -U"
bind-key -n C-l if-shell  "$is_editor || $is_fm || $is_fzf" "send-keys C-l"  "select-pane -R"
bind-key -n C-\\ if-shell "$is_editor" "send-keys C-\\\\"  "select-pane -l"

# Same keys also work in copy mode for consistency.
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# ---------------------------------------------------------------------------
# WINDOW & SESSION NAVIGATION
# ---------------------------------------------------------------------------
# Brackets switch sessions ([ = back, ] = forward, home row, no shift)
unbind [
unbind ]
bind [ switch-client -p           # C-Space [ → previous session
bind ] switch-client -n           # C-Space ] → next session
# h/l for window navigation (vim-style: h=back, l=forward)
bind h previous-window            # C-Space h → previous window
bind l next-window                # C-Space l → next window
bind a last-window                # C-Space a → toggle last window (a = alternate)
bind W list-windows               # C-Space W → show window list
unbind w
bind w choose-tree -Z             # C-Space w → interactive session/window/pane picker
bind o select-pane -t :.+         # C-Space o → cycle to next pane (vim C-w w style)

# ---------------------------------------------------------------------------
# SPLITS
# ---------------------------------------------------------------------------
# Split key shapes match the divider direction
# - (dash) = horizontal divider → panes stacked top/bottom
# / (slash) = vertical divider → panes side by side
unbind -
unbind /
bind - split-window -v -c '#{pane_current_path}'  # C-Space - → split vertically  (top/bottom)
bind / split-window -h -c '#{pane_current_path}'  # C-Space / → split horizontally (left/right)
unbind c
bind t new-window -c '#{pane_current_path}' -a     # C-Space t → new tab (window) on the right
bind z resize-pane -Z              # C-Space z → toggle pane zoom (fullscreen / restore)
bind B set -g status               # C-Space B → toggle status bar (B = Bar, shift avoids conflict with split)
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"  # C-Space r → reload config
bind R command-prompt -p "rename-session '#S':" "rename-session '%%'"         # C-Space R → rename session
bind H resize-pane -L 5           # C-Space H → grow left   by 5 cells
bind J resize-pane -D 5           # C-Space J → grow down   by 5 cells
bind K resize-pane -U 5           # C-Space K → grow up     by 5 cells
bind L resize-pane -R 5           # C-Space L → grow right  by 5 cells
bind O pipe-pane -o "cat >>~/#W.log" \; display "Pane logged in ~/#W.log"  # C-Space O → toggle pane logging
bind = set synchronize-panes \; display 'synchronize-panes #{?synchronize-panes,on,off}'  # C-Space = → toggle sync (equal = same input in all panes)

# ---------------------------------------------------------------------------
# THEME
# ---------------------------------------------------------------------------
# Load the status-bar theme generated by tmuxline.vim (Dracula-adjacent colors).
if-shell "test -f ~/.config/tmux/tmux_theme.conf" "source ~/.config/tmux/tmux_theme.conf"

# C-l sends a literal Ctrl-l (clear screen) even with vim-tmux-navigator active.
bind C-l send-keys 'C-l'

# ---------------------------------------------------------------------------
# RESURRECT (session persistence)
# ---------------------------------------------------------------------------
# resurrect: saves/restores tmux sessions (windows, panes, layouts, cwds) across reboots
set -g @resurrect-strategy-vim 'session'   # Restore vim sessions within resurrect
set -g @resurrect-strategy-nvim 'session'  # Same for neovim
set -g @resurrect-capture-pane-contents 'on'  # Also save visible pane content

# ---------------------------------------------------------------------------
# TPM – TMUX PLUGIN MANAGER
# ---------------------------------------------------------------------------
# tpm: TPM bootstrap — installs and loads all plugins below.
# prefix-highlight: Highlights the prefix key when pressed.
# yank: Yank to system clipboard, with enhanced copy-mode bindings.
# fingers: Highlight and yank text hints (files, URLs, SHAs) — like Zellij hints.
# extrakto: Fuzzy-select text from pane content without leaving tmux.
# tmux-fzf: Fuzzy session/window/pane switcher using fzf (actively maintained).
# sessionx: Modern session manager (replaces deprecated sessionist).
# resurrect: Save/restore tmux sessions.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'morantron/tmux-fingers'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Plugin-specific options
set -g @resurrect-processes 'ssh'           # Restore ssh sessions
set -g @extrakto_open_tool 'xdg-open'       # Open files/paths with the default OS handler
set -g @extrakto_clip_tool 'wl-copy'         # Wayland clipboard for extrakto
set -g @fingers-key "F"                     # C-Space F → launch fingers hints
set -g @fingers-hint-position "right"      # Show hint after the match, not overwriting first char
set -g @fingers-enabled-builtin-patterns "ip,url,path,sha,hex"  # Disable digit (too noisy with eza dates/sizes)
# Custom patterns anchored to end of line to skip icons/ANSI
set -g @fingers-pattern-0 '[\w@.\-]+\.\w{1,6}$'  # Files with extension at EOL (README.md, main.rs)
set -g @fingers-pattern-1 '[\w@.\-]+/$'           # Directories at EOL (pueue/, ssh/)
set -g @fingers-pattern-2 '\.[\w.\-]+$'            # Dotfiles at EOL (.sweeprc, .gitignore)
set -g @fingers-pattern-3 '/([\w.\/-]+)'           # Full paths (/home/user/file)
set-environment -g TMUX_FZF_LAUNCH_KEY "f"      # C-Space f → launch tmux-fzf
set-environment -g TMUX_FZF_ORDER "window|pane|session|command|keybinding|clipboard|process"

# Bootstrap: git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
# Inside tmux, press C-Space I (capital i) to install / update all plugins.
run '~/.config/tmux/plugins/tpm/tpm'
