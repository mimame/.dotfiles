# Dracula colors (colour256 for macOS tmux compatibility)
# ── bg       colour236 (#282a36)
# ── bg-alt   colour238 (#44475a)
# ── fg       colour255 (#f8f8f2)
# ── comment  colour60  (#6272a4)
# ── cyan     colour123 (#8be9fd)
# ── green    colour84  (#50fa7b)
# ── orange   colour209 (#ffb86c)
# ── pink     colour212 (#ff79c6)
# ── purple   colour141 (#bd93f9)
# ── red      colour203 (#ff5555)
# ── yellow   colour228 (#f1fa8c)

# ---------------------------------------------------------------------------
# GENERAL
# ---------------------------------------------------------------------------
set -g status-style                    "bg=colour236,none"
set -g status-justify                  "left"
set -g status-left-length              "100"
set -g status-right                    "#{prefix_highlight}"
set -g status-left-style               "none"
set -g status-right-style              "none"

# ---------------------------------------------------------------------------
# MESSAGES
# ---------------------------------------------------------------------------
set -g message-style                   "bg=colour209,fg=colour255"
set -g message-command-style           "bg=colour238,fg=colour255"

# ---------------------------------------------------------------------------
# BORDERS
# ---------------------------------------------------------------------------
set -g pane-border-style               "fg=colour60"
set -g pane-active-border-style        "fg=colour209"

# ---------------------------------------------------------------------------
# WINDOW TABS
# ---------------------------------------------------------------------------
setw -g window-status-style            "fg=colour255,bg=colour236,none"
setw -g window-status-activity-style   "bg=colour236,fg=colour60,none"
setw -g window-status-separator        ""
setw -g window-status-format           "#[fg=colour236,bg=colour238,bold] #I #[fg=colour236,bg=colour238,bold] #W#[fg=colour209,bg=colour236,bold]|"
setw -g window-status-current-format   "#[fg=colour255,bg=colour141,bold] #I  #W #[fg=colour209,bg=colour236,bold]|"

# ---------------------------------------------------------------------------
# STATUS BAR (session name + prefix highlight → clock/date → hostname)
# ---------------------------------------------------------------------------
set -g @prefix_highlight_fg            colour236
set -g @prefix_highlight_bg            colour209
set -g @prefix_highlight_show_copy_mode  on
set -g @prefix_highlight_prefix_prompt   "\342\234\223"
set -g @prefix_highlight_copy_prompt     "copy-mode"
set -g status-left                     "#[fg=colour255,bg=colour236,bold] #{user}@#h #[fg=colour209,bg=colour236,bold]|#[fg=colour212,bg=colour238,bold] #S #[fg=colour209,bg=colour236,bold]|"
