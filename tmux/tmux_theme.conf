# Dracula colors
# ── bg       #282a36
# ── bg-alt   #44475a
# ── fg       #f8f8f2
# ── comment  #6272a4
# ── cyan     #8be9fd
# ── green    #50fa7b
# ── orange   #ffb86c
# ── pink     #ff79c6
# ── purple   #bd93f9
# ── red      #ff5555
# ── yellow   #f1fa8c

# ---------------------------------------------------------------------------
# GENERAL
# ---------------------------------------------------------------------------
set -g status-style                    "bg=#282a36,none"
set -g status-justify                  "left"
set -g status-left-length              "100"
set -g status-right-length             "100"
set -g status-left-style               "none"
set -g status-right-style              "none"

# ---------------------------------------------------------------------------
# MESSAGES
# ---------------------------------------------------------------------------
set -g message-style                   "bg=#ffb86c,fg=#f8f8f2"
set -g message-command-style           "bg=#44475a,fg=#f8f8f2"

# ---------------------------------------------------------------------------
# BORDERS
# ---------------------------------------------------------------------------
set -g pane-border-style               "fg=#6272a4"
set -g pane-active-border-style        "fg=#ffb86c"

# ---------------------------------------------------------------------------
# WINDOW TABS
# ---------------------------------------------------------------------------
setw -g window-status-style            "fg=#f8f8f2,bg=#282a36,none"
setw -g window-status-activity-style   "bg=#282a36,fg=#6272a4,none"
setw -g window-status-separator        ""
setw -g window-status-format           "#[fg=#282a36,bg=#44475a,bold] #I #[fg=#282a36,bg=#44475a,bold] #W "
setw -g window-status-current-format   "#[fg=#282a36,bg=#bd93f9,nobold]#[fg=#f8f8f2,bg=#bd93f9,bold] #I  #W #[fg=#bd93f9,bg=#282a36,nobold]"

# ---------------------------------------------------------------------------
# STATUS BAR (session name + prefix highlight → clock/date → hostname)
# ---------------------------------------------------------------------------
set -g @prefix_highlight_fg            '#282a36'
set -g @prefix_highlight_bg            '#ffb86c'
set -g status-left                     "#{prefix_highlight}#[fg=#f8f8f2,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36]"
set -g status-right                    "#[fg=#6272a4,bg=#282a36]#[fg=#{?SSH_CONNECTION,#ffb86c,#f8f8f2},bg=#6272a4,bold] #{user}@#h "
