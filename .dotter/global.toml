[helpers]

# Usage instructions for local.toml:
# To customize your deployment per machine, create a .dotter/local.toml file.
# Select the desired package(s) based on your platform.
#
# Example .dotter/local.toml:
#
#   includes = []
#   packages = ["nixos"]
#
#   [files]
#
#   [variables]
#
# Available packages:
# - "default" (required, included automatically by depends)
# - "macos"   (for macOS-specific configurations)
# - "nixos"   (for Linux/NixOS-specific configurations)

[default]
depends = [  ]

[default.files]
atuin = { target = "~/.config/atuin", type = "symbolic" }
bin = "~/.bin"
broot = "~/.config/broot"
btop = "~/.config/btop"
clifm = "~/.config/clifm"
cmus = "~/.config/cmus"
direnv = "~/.config/direnv"
espanso = { target = "~/.config/espanso", type = "symbolic" }       # Files with {{}} automatically detected as templates
fastfetch = "~/.config/fastfetch"
fd = "~/.config/fd"
fish = "~/.config/fish"                                             # Use `dotter --force` to avoid issues with existing plugin files
gh = "~/.config/gh"
git = "~/.config/git"
gomi = "~/.config/gomi"
ghostty = "~/.config/ghostty"
helix = "~/.config/helix"
julia = "~/.julia/"
kitty = { target = "~/.config/kitty", type = "symbolic" }
lazygit = "~/.config/lazygit"
lazyvim = "~/.config/nvim/"
navi = "~/.config/navi"
nushell = { target = "~/.config/nushell", type = "symbolic" }
ptpython = "~/.config/ptpython"
pueue = { target = "~/.config/pueue", type = "symbolic" }
ripgrep = "~/.config/ripgrep"
rsync = "~/.config/rsync"
ssh = "~/.ssh"
starship = "~/.config/"
swappy = "~/.config/swappy"
tealdeer = "~/.config/tealdeer"
television = { target = "~/.config/television", type = "symbolic" }
topgrade = "~/.config/topgrade"
vscode = "~/.config/Code/User/"
yazi = { target = "~/.config/yazi", type = "symbolic" }
zed = "~/.config/zed"
zellij = "~/.config/zellij"

[default.variables]

[macos]
depends = [ "default" ]

[macos.files]
aerospace = "~/.config/aerospace"

[nixos]
depends = [ "default" ]

[nixos.files]
borgmatic = "~/.config/borgmatic"
danksearch = "~/.config/danksearch"
DankMaterialShell = "~/.config/DankMaterialShell"
mimeapps = "~/.config/mimeapps"
newsboat = "~/.config/newsboat"
niri = "~/.config/niri"
nixos = { target = "/etc/nixos", type = "symbolic", owner = "root" }
vimiv = "~/.config/vimiv"
zathura = "~/.config/zathura"
