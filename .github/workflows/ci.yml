name: CI
on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main, work]
permissions:
  contents: read
jobs:
  lint:
    name: Run prek checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history is required to accurately calculate changesets between arbitrary commits.
          fetch-depth: 0
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          # Pin to unstable to align with local development and shell.nix definitions.
          nix_path: nixpkgs=channel:nixos-unstable
      # Cache the Nix store between runs using GitHub Actions cache as backend.
      # Without this, every run re-downloads all packages in shell.nix from scratch
      # (fish, rubocop, treefmt, actionlint, gitleaks, etc.) — typically 2-4 minutes.
      #
      # How it works:
      #   - First run: packages are fetched normally, then pushed to the cache keyed
      #     by their Nix store path hashes.
      #   - Subsequent runs: cached paths are restored before nix-shell resolves them,
      #     so only changed or new packages are downloaded.
      #   - Cache invalidation is automatic: when nixpkgs-unstable updates, only the
      #     affected store paths miss the cache; unchanged packages are still served.
      #
      # Must be placed after install-nix-action and before any nix-shell/nix build call.
      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@v13
      # Determine the correct Git references for "before" and "after" because they
      # are accessed differently for "pull_request" and "push" events.
      # Ensures correct range of changed files.
      - name: Determine Commit Range
        id: refs
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PRs compare the feature branch against the target base (e.g., main).
            echo "from=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            # Pushes use the 'before' SHA to check only the new commits.
            FROM_REF="${{ github.event.before }}"

            # Fallback logic for edge cases:
            # 1. New branches (before is 000...0).
            # 2. Force-pushes (before SHA might be orphaned/unreachable).
            # 3. First commit in repo (HEAD^ fails).
            if [[ "$FROM_REF" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse --verify "$FROM_REF" >/dev/null 2>&1; then
              FROM_REF=$(git rev-parse HEAD^ 2>/dev/null || echo "HEAD")
            fi

            echo "from=$FROM_REF" >> "$GITHUB_OUTPUT"
            echo "to=${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          fi
      # Run prek hooks on the changeset.
      # Use the shell.nix file defined in the root directory to ensure the CI
      # environment perfectly replicates the local development environment.
      - name: Run prek
        run: |
          # Explicit refs prevent prek from checking files outside the current push/PR scope.
          nix-shell --run "prek run --from-ref ${{ steps.refs.outputs.from }} --to-ref ${{ steps.refs.outputs.to }}"
