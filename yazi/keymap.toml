# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]

keymap = [
  { on = "<Esc>", run = "escape", desc = "Exit visual mode, clear selected, or cancel search" },
  { on = "<C-[>", run = "escape", desc = "Exit visual mode, clear selected, or cancel search" },
  { on = "q", run = "quit", desc = "Quit the process" },
  { on = "Q", run = "quit --no-cwd-file", desc = "Quit the process without outputting cwd-file" },
  { on = "<C-c>", run = "close", desc = "Close the current tab, or quit if it's last" },
  { on = "<C-z>", run = "suspend", desc = "Suspend the process" },

  # Hopping
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },

  { on = "<Up>", run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1", desc = "Move cursor down" },

  { on = "<C-u>", run = "arrow -50%", desc = "Move cursor up half page" },
  { on = "<C-d>", run = "arrow 50%", desc = "Move cursor down half page" },
  { on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<C-f>", run = "arrow 100%", desc = "Move cursor down one page" },

  { on = "<S-PageUp>", run = "arrow -50%", desc = "Move cursor up half page" },
  { on = "<S-PageDown>", run = "arrow 50%", desc = "Move cursor down half page" },
  { on = "<PageUp>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<PageDown>", run = "arrow 100%", desc = "Move cursor down one page" },

  # Goto (Helix style)
  { on = [
    "g",
    "g",
  ], run = "arrow top", desc = "Go to top" },
  { on = [
    "g",
    "e",
  ], run = "arrow bot", desc = "Go to bottom" },
  { on = [
    "g",
    "h",
  ], run = "cd ~", desc = "Go home" },
  { on = [
    "g",
    "c",
  ], run = "cd ~/.config", desc = "Goto ~/.config" },
  { on = [
    "g",
    "d",
  ], run = "cd ~/Downloads", desc = "Goto ~/Downloads" },
  { on = [
    "g",
    "t",
  ], run = "cd /tmp", desc = "Goto /tmp" },
  { on = [
    "g",
    "a",
  ], run = "cd --interactive", desc = "Go to (interactive)" },

  # Navigation
  { on = "h", run = "leave", desc = "Go back to the parent directory" },
  { on = "l", run = "plugin smart-enter", desc = "Enter the child directory, or open the file" },

  { on = "<Left>", run = "leave", desc = "Go back to the parent directory" },
  { on = "<Right>", run = "enter", desc = "Enter the child directory" },

  { on = "H", run = "back", desc = "Go back to the previous directory" },
  { on = "L", run = "forward", desc = "Go forward to the next directory" },

  # Selection (Helix style)
  { on = "x", run = [
    "toggle",
    "arrow 1",
  ], desc = "Toggle selection (down)" },
  { on = "X", run = [
    "toggle",
    "arrow -1",
  ], desc = "Toggle selection (up)" },
  { on = "%", run = "toggle_all --state=on", desc = "Select all files" },
  { on = "<A-x>", run = "toggle_all", desc = "Invert selection of all files" },
  { on = "<C-a>", run = "toggle_all --state=on", desc = "Select all files" },
  { on = "<C-r>", run = "toggle_all", desc = "Invert selection of all files" },
  { on = "v", run = "visual_mode", desc = "Enter visual mode" },
  { on = "V", run = "visual_mode --unset", desc = "Enter visual mode (unset)" },

  # Leader (Helix style)
  { on = [
    "<Space>",
    "y",
  ], run = "copy path", desc = "Copy path" },
  { on = [
    "<Space>",
    "f",
  ], run = "filter --smart", desc = "Filter files" },
  { on = [
    "<Space>",
    "s",
  ], run = "search --via=fd", desc = "Search files" },
  { on = [
    "<Space>",
    "c",
  ], run = "plugin ouch", desc = "Compress with ouch" },
  { on = [
    "<Space>",
    "x",
  ], run = "open --launcher=extract", desc = "Extract here (ouch)" },
  { on = [
    "<Space>",
    "e",
  ], run = 'shell "${EDITOR:-hx} \"$@\"" --block', desc = "Edit with $EDITOR" },
  { on = [
    "<Space>",
    "u",
  ], run = "unyank", desc = "Cancel yank (unyank)" },
  { on = [
    "<Space>",
    "D",
  ], run = "remove --permanently", desc = "Permanently delete" },
  { on = [
    "<Space>",
    ".",
  ], run = "hidden toggle", desc = "Toggle hidden files" },
  { on = [
    "<Space>",
    "w",
  ], run = "tasks_show", desc = "Show task manager" },
  { on = [
    "<Space>",
    "k",
  ], run = "help", desc = "Open help" },
  { on = [
    "<Space>",
    "q",
  ], run = "quit", desc = "Quit the process" },

  # Filter / Search
  { on = "f", run = "filter --smart", desc = "Filter files" },
  { on = "/", run = "search --via=fd", desc = "Search files (fd)" },
  { on = "?", run = "search --via=rg", desc = "Search content (ripgrep)" },
  { on = "n", run = "find_arrow", desc = "Go to next match" },
  { on = "N", run = "find_arrow --previous", desc = "Go to previous match" },

  # Seeking / Spotting
  { on = "K", run = "seek -5", desc = "Seek up 5 units in the preview" },
  { on = "J", run = "seek 5", desc = "Seek down 5 units in the preview" },
  { on = "<Tab>", run = "spot", desc = "Spot hovered file" },

  # Operation (Helix/Vim Hybrid)
  { on = "o", run = "open", desc = "Open with system default" },
  { on = "O", run = 'shell "gio open ." --orphan', desc = "Open current directory in file manager" },
  { on = "<Enter>", run = "plugin smart-enter", desc = "Enter the child directory, or open the file" },
  { on = "y", run = "yank", desc = "Yank (copy)" },
  { on = "d", run = "yank --cut", desc = "Yank (cut/delete)" },
  { on = "D", run = "remove", desc = "Trash selected files" },
  { on = "p", run = "paste", desc = "Paste yanked files" },
  { on = "P", run = "paste --force", desc = "Paste (force overwrite)" },
  { on = "-", run = "link", desc = "Symlink (absolute)" },
  { on = "_", run = "link --relative", desc = "Symlink (relative)" },
  { on = "a", run = "create", desc = "Create file/dir" },
  { on = "c", run = "rename --cursor=before_ext", desc = "Rename (change)" },
  { on = "r", run = "rename --cursor=before_ext", desc = "Rename" },
  { on = ";", run = "shell --interactive", desc = "Run shell command" },
  { on = ":", run = "shell --block --interactive", desc = "Run shell command (block)" },
  { on = ".", run = "hidden toggle", desc = "Toggle hidden files" },

  # Sorting
  { on = [
    ",",
    "m",
  ], run = [
    "sort mtime --reverse=no",
    "linemode mtime",
  ], desc = "Sort by mtime" },
  { on = [
    ",",
    "M",
  ], run = [
    "sort mtime --reverse",
    "linemode mtime",
  ], desc = "Sort by mtime (rev)" },
  { on = [
    ",",
    "b",
  ], run = [
    "sort btime --reverse=no",
    "linemode btime",
  ], desc = "Sort by btime" },
  { on = [
    ",",
    "B",
  ], run = [
    "sort btime --reverse",
    "linemode btime",
  ], desc = "Sort by btime (rev)" },
  { on = [
    ",",
    "e",
  ], run = "sort extension --reverse=no", desc = "Sort by extension" },
  { on = [
    ",",
    "E",
  ], run = "sort extension --reverse", desc = "Sort by extension (rev)" },
  { on = [
    ",",
    "a",
  ], run = "sort alphabetical --reverse=no", desc = "Sort alphabetically" },
  { on = [
    ",",
    "A",
  ], run = "sort alphabetical --reverse", desc = "Sort alphabetically (rev)" },
  { on = [
    ",",
    "n",
  ], run = "sort natural --reverse=no", desc = "Sort naturally" },
  { on = [
    ",",
    "N",
  ], run = "sort natural --reverse", desc = "Sort naturally (rev)" },
  { on = [
    ",",
    "s",
  ], run = [
    "sort size --reverse=no",
    "linemode size",
  ], desc = "Sort by size" },
  { on = [
    ",",
    "S",
  ], run = [
    "sort size --reverse",
    "linemode size",
  ], desc = "Sort by size (rev)" },

  # Window / Tab Management (Helix style)
  { on = [
    "<C-w>",
    "n",
  ], run = "tab_create --current", desc = "New tab" },
  { on = [
    "<C-w>",
    "q",
  ], run = "close", desc = "Close tab" },
  { on = [
    "<C-w>",
    "k",
  ], run = "tab_switch -1 --relative", desc = "Prev tab" },
  { on = [
    "<C-w>",
    "j",
  ], run = "tab_switch 1 --relative", desc = "Next tab" },
  { on = [
    "<C-w>",
    "h",
  ], run = "tab_switch -1 --relative", desc = "Prev tab" },
  { on = [
    "<C-w>",
    "l",
  ], run = "tab_switch 1 --relative", desc = "Next tab" },
  { on = [
    "<C-w>",
    "w",
  ], run = "tab_switch 1 --relative", desc = "Next tab" },

  # Tabs (Direct access)
  { on = "t", run = "tab_create --current", desc = "Create a new tab with CWD" },
  { on = "1", run = "tab_switch 0", desc = "Switch to the first tab" },
  { on = "2", run = "tab_switch 1", desc = "Switch to the second tab" },
  { on = "3", run = "tab_switch 2", desc = "Switch to the third tab" },
  { on = "4", run = "tab_switch 3", desc = "Switch to the fourth tab" },
  { on = "5", run = "tab_switch 4", desc = "Switch to the fifth tab" },
  { on = "6", run = "tab_switch 5", desc = "Switch to the sixth tab" },
  { on = "7", run = "tab_switch 6", desc = "Switch to the seventh tab" },
  { on = "8", run = "tab_switch 7", desc = "Switch to the eighth tab" },
  { on = "9", run = "tab_switch 8", desc = "Switch to the ninth tab" },
  { on = "[", run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = "]", run = "tab_switch 1 --relative", desc = "Switch to next tab" },
  { on = "{", run = "tab_swap -1", desc = "Swap with previous tab" },
  { on = "}", run = "tab_swap 1", desc = "Swap with next tab" },

  # Tasks / Help
  { on = "w", run = "tasks_show", desc = "Show task manager" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close task manager" },
  { on = "<C-[>", run = "close", desc = "Close task manager" },
  { on = "<C-c>", run = "close", desc = "Close task manager" },
  { on = "w", run = "close", desc = "Close task manager" },
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },
  { on = "<Up>", run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1", desc = "Move cursor down" },
  { on = "<Enter>", run = "inspect", desc = "Inspect the task" },
  { on = "x", run = "cancel", desc = "Cancel the task" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[spot]
keymap = [
  { on = "<Esc>", run = "close", desc = "Close the spot" },
  { on = "<C-[>", run = "close", desc = "Close the spot" },
  { on = "<C-c>", run = "close", desc = "Close the spot" },
  { on = "<Tab>", run = "close", desc = "Close the spot" },
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },
  { on = "h", run = "swipe -1", desc = "Swipe to the previous file" },
  { on = "l", run = "swipe 1", desc = "Swipe to the next file" },
  { on = "<Up>", run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1", desc = "Move cursor down" },
  { on = "<Left>", run = "swipe -1", desc = "Swipe to the next file" },
  { on = "<Right>", run = "swipe 1", desc = "Swipe to the previous file" },
  { on = [
    "c",
    "c",
  ], run = "copy cell", desc = "Copy selected cell" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[pick]
keymap = [
  { on = "<Esc>", run = "close", desc = "Cancel pick" },
  { on = "<C-[>", run = "close", desc = "Cancel pick" },
  { on = "<C-c>", run = "close", desc = "Cancel pick" },
  { on = "<Enter>", run = "close --submit", desc = "Submit the pick" },
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },
  { on = "<Up>", run = "arrow -1", desc = "Move cursor up" },
  { on = "<Down>", run = "arrow 1", desc = "Move cursor down" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[input]
keymap = [
  { on = "<C-c>", run = "close", desc = "Cancel input" },
  { on = "<Enter>", run = "close --submit", desc = "Submit input" },
  { on = "<Esc>", run = "escape", desc = "Go back the normal mode, or cancel input" },
  { on = "<C-[>", run = "escape", desc = "Go back the normal mode, or cancel input" },
  { on = "i", run = "insert", desc = "Enter insert mode" },
  { on = "I", run = [
    "move first-char",
    "insert",
  ], desc = "Move to BOL and insert" },
  { on = "a", run = "insert --append", desc = "Enter append mode" },
  { on = "A", run = [
    "move eol",
    "insert --append",
  ], desc = "Move to EOL and append" },
  { on = "v", run = "visual", desc = "Enter visual mode" },
  { on = "V", run = [
    "move bol",
    "visual",
    "move eol",
  ], desc = "Visual select all" },
  { on = "r", run = "replace", desc = "Replace a single character" },
  { on = "h", run = "move -1", desc = "Move back a character" },
  { on = "l", run = "move 1", desc = "Move forward a character" },
  { on = "<Left>", run = "move -1", desc = "Move back a character" },
  { on = "<Right>", run = "move 1", desc = "Move forward a character" },
  { on = "b", run = "backward", desc = "Move back to word start" },
  { on = "B", run = [
    "move bol",
    "backward",
  ], desc = "Move to start of line" },
  { on = "w", run = "forward", desc = "Move forward to word start" },
  { on = "W", run = [
    "move eol",
    "forward",
  ], desc = "Move to end of line" },
  { on = "e", run = "forward --end-of-word", desc = "Move forward to word end" },
  { on = "E", run = "forward --far --end-of-word", desc = "Move forward to WORD end" },
  { on = "0", run = "move bol", desc = "Move to BOL" },
  { on = "$", run = "move eol", desc = "Move to EOL" },
  { on = "<C-a>", run = "move bol", desc = "Move to BOL" },
  { on = "<C-e>", run = "move eol", desc = "Move to EOL" },
  { on = "<Backspace>", run = "backspace", desc = "Delete character before" },
  { on = "<Delete>", run = "backspace --under", desc = "Delete character under" },
  { on = "u", run = "undo", desc = "Undo" },
  { on = "<C-r>", run = "redo", desc = "Redo" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[confirm]
keymap = [
  { on = "<Esc>", run = "close", desc = "Cancel" },
  { on = "<C-[>", run = "close", desc = "Cancel" },
  { on = "<C-c>", run = "close", desc = "Cancel" },
  { on = "<Enter>", run = "close --submit", desc = "Submit" },
  { on = "n", run = "close", desc = "Cancel" },
  { on = "y", run = "close --submit", desc = "Submit" },
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[cmp]
keymap = [
  { on = "<C-c>", run = "close", desc = "Cancel" },
  { on = "<Tab>", run = "close --submit", desc = "Submit" },
  { on = "<Enter>", run = [
    "close --submit",
    "close_input --submit",
  ], desc = "Submit all" },
  { on = "<C-p>", run = "arrow -1", desc = "Move cursor up" },
  { on = "<C-n>", run = "arrow 1", desc = "Move cursor down" },
  { on = "~", run = "help", desc = "Open help" },
  { on = "<F1>", run = "help", desc = "Open help" },
]

[help]
keymap = [
  { on = "<Esc>", run = "escape", desc = "Clear filter or hide" },
  { on = "<C-[>", run = "escape", desc = "Clear filter or hide" },
  { on = "<C-c>", run = "close", desc = "Hide" },
  { on = "k", run = "arrow -1", desc = "Move cursor up" },
  { on = "j", run = "arrow 1", desc = "Move cursor down" },
  { on = "f", run = "filter", desc = "Apply filter" },
]

[[mgr.prepend_keymap]]
on = ["1"]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["2"]
run = "plugin relative-motions 2"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["3"]
run = "plugin relative-motions 3"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["4"]
run = "plugin relative-motions 4"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["5"]
run = "plugin relative-motions 5"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["6"]
run = "plugin relative-motions 6"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["7"]
run = "plugin relative-motions 7"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["8"]
run = "plugin relative-motions 8"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["9"]
run = "plugin relative-motions 9"
desc = "Move in relative steps"

[[mgr.prepend_keymap]]
on = ["m"]
run = "plugin relative-motions"
desc = "Trigger a new relative motion"

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"
