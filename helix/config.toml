# ----------------------------------------------------------------------------
# Helix Editor Configuration
#
# Modal editor with LSP, modern keybindings, and IDE features.
# WHY Helix: Native LSP, no plugins needed, Kakoune-style selection-first editing.
# ----------------------------------------------------------------------------

theme = "catppuccin_mocha"

[editor]
# WHY fish: Consistency with system shell
shell = [ "fish", "-c" ]
# WHY false: Prevent accidental pastes, improve cross-platform consistency
middle-click-paste = false
# WHY 2: Fast completion without being intrusive
completion-trigger-len = 2
# WHY relative: Easier jump distance calculation (5j, 10k)
line-number = "relative"
# WHY true: Visual focus on current line
cursorline = true
# WHY true: Mode awareness via background color
color-modes = true
# WHY false: Avoid replacing text accidentally
completion-replace = false
# WHY true: Modern IDE behavior
auto-save = true
# WHY always: Persistent context across buffers
bufferline = "always"
# Gutter: diagnostics → line numbers → spacing → git diff
gutters = [ "diagnostics", "line-numbers", "spacer", "diff" ]
# WHY +: System clipboard for cross-app integration
auto-pairs = true
auto-format = true
true-color = true
# WHY 50ms: Near-instant hover/diagnostic feedback
idle-timeout = 50
# Jump labels prioritized by home row
jump-label-alphabet = "asdfghjklqwertyuiopzxcvbnm"
# WHY true: Underline errors with squiggly lines
undercurl = true

[editor.statusline]
# High-signal info on left, contextual info on right
left = [
  "mode",
  "spinner",
  "version-control",
  "file-name",
  "file-modification-indicator",
  "separator",
]
right = [
  "diagnostics",
  "workspace-diagnostics",
  "separator",
  "selections",
  "separator",
  "position",
  "position-percentage",
  "total-line-numbers",
  "separator",
  "file-encoding",
  "file-line-ending",
  "file-type",
]
separator = "│"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
# WHY true: Type hints, parameter names improve code readability
display-inlay-hints = true
# WHY true: Show function signature docs in popup
display-signature-help-docs = true
# WHY true: Auto-show signature help when typing
auto-signature-help = true
# WHY true: Jump to definition includes declaration
goto-reference-include-declaration = true
snippets = true

[editor.file-picker]
# WHY false: Don't clutter picker with hidden files
hidden = false
# WHY true: Follow gitignore rules
git-ignore = true
# WHY true: Respect global git excludes
git-global = true

[editor.search]
# WHY true: Smart case-sensitive search
smart-case = true
# WHY true: Wrap search around file edges
wrap-around = true

[editor.whitespace]
# WHY none: Clean visual appearance (enable when debugging spacing)
render = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 0

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.smart-tab]
# WHY true: Tab completes if in middle of word, otherwise inserts indent
enable = true
supersede-menu = false

# ----------------------------------------------------------------------------
# Keybindings: Normal Mode
# Only custom bindings that improve workflow, not overriding defaults
# ----------------------------------------------------------------------------
[keys.normal]
# Fast config reload (development workflow)
C-o = ":config-open"
C-r = ":config-reload"

# Buffer navigation: H/L as directional "jump" keys
H = ":bp"
L = ":bn"

# Auto-center on search/navigation (maintain visual context)
n = [ "search_next", "align_view_center" ]
N = [ "search_prev", "align_view_center" ]
C-d = [ "half_page_down", "align_view_center" ]
C-u = [ "half_page_up", "align_view_center" ]

# Move lines: Alt-j (down), Alt-k (up)
A-j = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
A-k = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]

# Search word under cursor (like Vim's *)
"*" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_next",
]
"#" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_prev",
]

# Line selection: x (extend down), X (extend up)
x = "extend_line_below"
X = "extend_line_above"

# WHY: Clear multi-cursor/complex selections with single escape
esc = [ "collapse_selection", "keep_primary_selection" ]

# Lazygit integration: full TUI workflow
C-g = [
  ":write-all",
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]

# ----------------------------------------------------------------------------
# Leader Mode (Space): Additional custom bindings
# ----------------------------------------------------------------------------
[keys.normal.space]
# Double-space for the most frequent action: opening a file
space = "file_picker"
# Rapid save and quit
w = ":w"
q = ":q"
# Force Exit (Discard changes)
Q = ":q!"
# Instant buffer picker for non-linear context switching
p = "buffer_picker"
# Clean up workspace by closing the current buffer
k = ":bc"

# ----------------------------------------------------------------------------
# Insert Mode Keybindings
# ----------------------------------------------------------------------------
[keys.insert]
# Single tap escape to clear selections and return to normal mode
esc = [ "collapse_selection", "normal_mode" ]

# ----------------------------------------------------------------------------
# Select Mode Keybindings
# ----------------------------------------------------------------------------
[keys.select]
# Buffer navigation parity with normal mode
H = ":bp"
L = ":bn"

# Line-wise selection improvements: Ensure sensible directional movement
k = [ "extend_line_up", "extend_to_line_bounds" ]
j = [ "extend_line_down", "extend_to_line_bounds" ]
