theme = "catppuccin_mocha"

# --- Editor General Settings ---
[editor]
# Shell to use when running external commands (Fish for consistency with system)
shell = [ "fish", "-c" ]
# Disable middle-click paste for safety and cross-platform consistency
middle-click-paste = false
# Completion trigger length (Short for snappiness)
completion-trigger-len = 2
# Relative line numbers for easier jump distance calculation
line-number = "relative"
# Highlight all lines with a cursor for better focus
cursorline = true
# Visual feedback for current mode via background color
color-modes = true
# Modern IDE features: automatic saving
completion-replace = false
auto-save = true
# Persistent bufferline for better context
bufferline = "always"
# Gutter setup with clear visual indicators
gutters = [ "diagnostics", "line-numbers", "spacer", "diff" ]
# Use the system clipboard for seamless cross-app integration
default-yank-register = "+"
# Snappier UI - Near-instant hovers/diagnostics feedback
idle-timeout = 50

# Character set to use for jump labels
jump-label-alphabet = "asdfghjklqwertyuiopzxcvbnm"

# --- Statusline Configuration ---
# Logic: High-signal/Critical info (Mode, Branch, Filename) on the Left.
#        Contextual/Meta info (Line/Col, Selections, Encoding) on the Right.
[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  "file-name",
  "file-modification-indicator",
  "separator",
]
right = [
  "diagnostics",
  "workspace-diagnostics",
  "separator",
  "selections",
  "separator",
  "position",
  "position-percentage",
  "total-line-numbers",
  "separator",
  "file-encoding",
  "file-line-ending",
  "file-type",
]
separator = "│"

[editor.cursor-shape]
# Cursor shape in insert mode
insert = "bar"
# Cursor shape in normal mode
normal = "block"
# Cursor shape in select mode
select = "underline"

[editor.lsp]
# Display inlay hints
display-inlay-hints = true
# Enable LSP snippets
snippets = true

[editor.file-picker]
# Enables ignoring hidden files
hidden = false

[editor.whitespace]
# Whether to render whitespace
render = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
tab = "→"
newline = "⏎"

[editor.indent-guides]
# Whether to render indent guides
render = true
# Literal character to use for rendering the indent guide
character = "╎"

[editor.soft-wrap]
enable = true
wrap-indicator = "↪ "

# --- Normal Mode Keybindings ---
[keys.normal]
# Faster configuration feedback loop
C-o = ":config-open"
C-r = ":config-reload"

# Ergonomic Buffer navigation: Consistent with H/L as directional "jump" keys
H = ":bp"
L = ":bn"

# Maintain visual context: Auto-center on every search result/jump
n = [ "search_next", "align_view_center" ]
N = [ "search_prev", "align_view_center" ]
C-d = [ "half_page_down", "align_view_center" ]
C-u = [ "half_page_up", "align_view_center" ]

# Selection-aware movement: Rapidly swap lines or entire blocks
A-j = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
A-k = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]

# Improved pattern search: Faster word-under-cursor discovery
"*" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_next",
]
"#" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_prev",
]

# Symmetric selection Logic: Directional growth (x=down, X=up)
# This removes redundancy and makes block selection more intuitive.
x = "extend_line_below"
X = "extend_line_above"

# Hard Reset: Single tap clears all complex selections and multiple cursors
# Crucial for returning to a clean state after complex operations.
esc = [ "collapse_selection", "keep_primary_selection" ]

# Lazygit integration: Comprehensive TUI workflow
C-g = [
  ":write-all",
  ":new",
  ":insert-output lazygit",
  ":buffer-close!",
  ":redraw",
  ":reload-all",
]

# --- Ergonomic Leader (Space) Mode ---
# Centralizes project/buffer management into a unified "Command Center".
[keys.normal.space]
# Double-space for the most frequent action: opening a file
space = "file_picker"
# Rapid save and quit
w = ":w"
q = ":q"
# Force Exit (Discard changes)
Q = ":q!"
# Instant buffer picker for non-linear context switching
p = "buffer_picker"
# Clean up workspace by closing the current buffer
k = ":bc"

# --- Insert Mode Keybindings ---
[keys.insert]
# Single tap escape to clear selections and return to normal mode
esc = [ "collapse_selection", "normal_mode" ]

# --- Select Mode Keybindings ---
[keys.select]
# Buffer navigation parity with normal mode
H = ":bp"
L = ":bn"

# Line-wise selection improvements: Ensure sensible directional movement
k = [ "extend_line_up", "extend_to_line_bounds" ]
j = [ "extend_line_down", "extend_to_line_bounds" ]
