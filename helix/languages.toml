# ----------------------------------------------------------------------------
# Helix Language Configuration
#
# LSP servers, formatters, and auto-format settings for all supported languages.
# ----------------------------------------------------------------------------

# --- Nix ---
[[language]]
name = "nix"
language-servers = [ "nixd" ]
formatter = { command = "nixfmt" }
auto-format = false

[language-server.nixd]
command = "nixd"

[language-server.nixd.settings]
nixpkgs = { expr = "import <nixpkgs> { }" }
options = { nixos = { expr = "import ~/.dotfiles/nixos/configuration.nix { }" } }
formatting = { command = [ "nixfmt" ] }

# --- Rust ---
[[language]]
name = "rust"
language-servers = [ "rust-analyzer" ]
auto-format = true

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'

[language-server.rust-analyzer.config.check]
# WHY clippy: More comprehensive linting than rustc
command = "clippy"

# --- TOML ---
[[language]]
name = "toml"
language-servers = [ "taplo" ]
formatter = { command = "taplo", args = [ "format", "-" ] }
auto-format = false

# --- Python ---
[[language]]
name = "python"
# WHY: ruff for fast linting/formatting, ty for type checking (faster than pyright)
language-servers = [ "ruff", "ty" ]
auto-format = true

[language-server.ruff]
command = "ruff"
args = [ "server" ]

[language-server.ty]
command = "ty"
args = [ "lsp" ]

# --- Lua ---
[[language]]
name = "lua"
language-servers = [ "lua-language-server" ]
formatter = { command = "stylua", args = [
  "--indent-width",
  "2",
  "--indent-type",
  "Spaces",
  "-",
] }
auto-format = false

# --- Bash/Shell ---
[[language]]
name = "bash"
language-servers = [ "bash-language-server" ]
formatter = { command = "shfmt", args = [ "-i", "2" ] }
auto-format = false

# --- Go ---
[[language]]
name = "go"
language-servers = [ "gopls" ]
formatter = { command = "goimports" }
auto-format = true

# --- SQL ---
[[language]]
name = "sql"
language-servers = [ "sqlfluff" ]
formatter = { command = "sqlfluff", args = [ "format", "-" ] }
auto-format = false

[language-server.sqlfluff]
command = "sqlfluff"
args = [ "serve" ]

# --- Markdown ---
[[language]]
name = "markdown"
language-servers = [ "marksman" ]
# WHY: rumdl is faster and more opinionated than markdownlint-cli2
formatter = { command = "rumdl", args = [ "--fix", "-" ] }
auto-format = false

# --- YAML ---
[[language]]
name = "yaml"
language-servers = [ "yaml-language-server" ]
formatter = { command = "yamlfmt", args = [ "-" ] }
auto-format = false

# --- JSON ---
[[language]]
name = "json"
language-servers = [ "vscode-json-language-server" ]
formatter = { command = "jsonfmt" }
auto-format = false

# --- Zig ---
[[language]]
name = "zig"
language-servers = [ "zls" ]
auto-format = true

# --- Elixir ---
[[language]]
name = "elixir"
language-servers = [ "elixir-ls" ]
auto-format = false

# --- Typst ---
[[language]]
name = "typst"
language-servers = [ "tinymist" ]
formatter = { command = "typstyle", args = [ "format", "-" ] }
auto-format = true

# --- TypeScript ---
[[language]]
name = "typescript"
language-servers = [ "typescript-language-server" ]
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.ts",
] }
auto-format = true

# --- JavaScript ---
[[language]]
name = "javascript"
language-servers = [ "typescript-language-server" ]
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.js",
] }
auto-format = true

# --- HTML ---
[[language]]
name = "html"
language-servers = [ "vscode-html-language-server" ]
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.html",
] }
auto-format = true

# --- CSS ---
[[language]]
name = "css"
language-servers = [ "vscode-css-language-server" ]
formatter = { command = "biome", args = [
  "format",
  "--stdin-file-path",
  "file.css",
] }
auto-format = true

# --- Ruby ---
[[language]]
name = "ruby"
language-servers = [ "ruby-lsp" ]
formatter = { command = "rubocop", args = [
  "--autocorrect",
  "--stdin",
  "filename",
] }
auto-format = false
